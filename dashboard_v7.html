<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROQUELEC V7 - MILITARY COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/js/marked.min.js"></script>
    <script src="/static/js/jspdf.umd.min.js"></script>
    <style>
        /* MILITARY THEME */
        :root {
            --bg-dark: #0f172a;
            --panel-dark: #1e293b;
            --accent-green: #10b981;
            --text-primary: #e2e8f0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
        }

        .military-panel {
            background-color: var(--panel-dark);
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .status-led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        .led-green {
            background-color: var(--accent-green);
            box-shadow: 0 0 5px var(--accent-green);
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.5;
            }
        }

        .bubble {
            max-width: 80%;
            padding: 12px;
            border-radius: 8px;
            font-family: sans-serif;
            line-height: 1.5;
        }

        .bubble.user {
            align-self: flex-end;
            background-color: #2563eb;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .bubble.ai {
            align-self: flex-start;
            background-color: #334155;
            color: #e2e8f0;
            border-bottom-left-radius: 2px;
            border-left: 3px solid var(--accent-green);
        }

        .bubble table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
            font-size: 0.9em;
        }

        .bubble th {
            background: #475569;
            padding: 5px;
            text-align: left;
        }

        .bubble td {
            border-top: 1px solid #475569;
            padding: 5px;
        }
    </style>
</head>

<body class="h-screen flex text-sm">

    <!-- SIDEBAR -->
    <div class="w-72 military-panel flex flex-col p-4 border-r border-slate-700 z-10">
        <div class="mb-6">
            <h1 class="text-xl font-bold text-emerald-400 tracking-wider">PROQUELEC <span class="text-white">AIV7</span>
            </h1>
            <div class="text-xs text-slate-400 tracking-widest mt-1">COMMAND CENTER</div>
        </div>

        <!-- METRICS -->
        <div class="bg-slate-900/50 p-3 rounded mb-4 border border-slate-700">
            <h3 class="text-xs font-bold text-slate-400 mb-2 uppercase">System Status</h3>
            <div class="flex justify-between mb-1">
                <span>Core Logic:</span>
                <span class="text-emerald-400"><span class="status-led led-green mr-1"></span>ACTIVE</span>
            </div>
            <div class="flex justify-between mb-1">
                <span>LLM (Phi-3.5):</span>
                <span class="text-emerald-400" id="llmStatus">READY</span>
            </div>
            <div class="mt-2 text-xs text-slate-500">
                Mem: <span id="memUsage">2.4GB</span> | Latency: <span id="lastLatency">--</span>ms
            </div>
        </div>

        <button onclick="exportPDF()"
            class="w-full bg-slate-700 hover:bg-slate-600 text-white py-2 px-3 rounded mb-2 transition flex items-center justify-center gap-2">
            <span>📄</span> Exporter Rapport (PDF)
        </button>
        <button onclick="window.location.reload()"
            class="w-full border border-slate-600 hover:bg-slate-800 text-slate-300 py-2 px-3 rounded transition text-xs">
            ⚠️ Emergency Reset
        </button>

        <div class="mt-auto text-xs text-slate-600 text-center">
            V7.0.0 Military Edition<br>Sovereign Server
        </div>
    </div>

    <!-- MAIN CHAT -->
    <div class="flex-1 flex flex-col relative bg-[url('/static/grid_bg.png')]">
        <!-- HEADER -->
        <div class="h-14 military-panel border-b border-slate-700 flex items-center justify-between px-6">
            <div class="flex items-center space-x-4">
                <!-- MODE TOGGLE -->
                <div class="flex items-center space-x-2 bg-slate-800 rounded-lg p-1 border border-slate-700">
                    <button id="mode-hybrid" onclick="setMode('hybrid')"
                        class="px-3 py-1 rounded text-xs font-bold transition-colors bg-emerald-500 text-black">HYBRID</button>
                    <button id="mode-kebe" onclick="setMode('kebe')"
                        class="px-3 py-1 rounded text-xs font-bold transition-colors text-slate-400 hover:text-white">KEBE</button>
                </div>

                <!-- Persona Selector -->
                <div class="relative">
                    <select id="personaSelect" title="Sélectionner un profil d'utilisateur"
                        class="bg-slate-800 border border-slate-600 text-white text-xs rounded px-2 py-1 outline-none focus:border-emerald-500">
                        <option value="installateur">🛠️ Installateur</option>
                        <option value="bureau_etude">📐 Bureau Études</option>
                        <option value="admin">🛑 Inspecteur (Admin)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- CHAT AREA -->
        <div id="chatBox" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4 scroll-smooth">
            <div class="bubble ai">
                <strong>SYSTEM:</strong> Initialisation terminée.<br>
                Hybridation [Phi-3.5 + KEBE] active. Mémoire contextuelle active.<br>
                <em>En attente d'ordres...</em>
            </div>
        </div>

        <!-- INPUT -->
        <div class="p-4 military-panel border-t border-slate-700">
            <div class="flex gap-2 relative">
                <input type="text" id="userInput"
                    class="flex-1 bg-slate-800 border border-slate-600 rounded p-3 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition"
                    placeholder="Entrez vos instructions techniques..." onkeypress="handleEnter(event)"
                    autocomplete="off">
                <button onclick="sendMessage()"
                    class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 rounded font-bold tracking-wide transition shadow-lg shadow-emerald-900/20">
                    SEND
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8002/api/v1";
        const chatBox = document.getElementById('chatBox');
        let conversationHistory = []; // For PDF Export
        const sessionId = "session_" + Date.now(); // Simple session ID

        let currentMode = 'hybrid'; // Default Mode

        function setMode(mode) {
            currentMode = mode;
            // Update UI
            if (mode === 'hybrid') {
                document.getElementById('mode-hybrid').className = "px-3 py-1 rounded text-xs font-bold transition-colors bg-emerald-500 text-black";
                document.getElementById('mode-kebe').className = "px-3 py-1 rounded text-xs font-bold transition-colors text-slate-400 hover:text-white";
                document.getElementById('currentMode').innerText = "HYBRID";
                addBubble("Mode HYBRIDE activé : Intelligence Artificielle + Rigueur Normative.", "system");
            } else {
                document.getElementById('mode-hybrid').className = "px-3 py-1 rounded text-xs font-bold transition-colors text-slate-400 hover:text-white";
                document.getElementById('mode-kebe').className = "px-3 py-1 rounded text-xs font-bold transition-colors bg-amber-600 text-black";
                document.getElementById('currentMode').innerText = "KEBE";
                addBubble("Mode KEBE (Strict) activé : Moteur Normatif Pur (Zéro LLM).", "system");
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const persona = document.getElementById('personaSelect').value;
            const text = input.value.trim();
            if (!text) return;

            // User UI
            addBubble(text, 'user');
            input.value = '';
            conversationHistory.push({ role: 'user', content: text });

            // Loading UI
            const loadingId = addBubble("▋ Traitement en cours...", 'ai', true);
            const startTime = Date.now();

            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: text,
                        persona: persona,
                        mode: currentMode,
                        session_id: sessionId
                    })
                });

                const data = await res.json();
                removeBubble(loadingId);
                const endTime = Date.now();

                // Compute Metrics
                const latency = endTime - startTime;
                let tokens = 0;
                if (data.metrics && data.metrics.completion_tokens) {
                    tokens = data.metrics.completion_tokens;
                    const speed = (tokens / (latency / 1000)).toFixed(1);
                    document.getElementById('tokenSpeed').innerText = `Speed: ${speed} t/s`;
                }
                document.getElementById('lastLatency').innerText = latency;

                // AI Response
                const mdHtml = marked.parse(data.response);
                let confidenceHtml = "";
                let inspectorHtml = "";

                // --- INSPECTOR MODE (Dual UI) ---
                if (data.structured_fact) {
                    const fact = data.structured_fact;
                    inspectorHtml = `
                    <div class="mb-4 bg-slate-800 border-2 border-slate-600 rounded-lg p-0 overflow-hidden shadow-lg">
                        <div class="bg-slate-900 border-b border-slate-700 px-4 py-2 flex justify-between items-center">
                            <span class="text-xs font-bold text-emerald-400 uppercase tracking-wider">🔒 VISA TECHNIQUE PRELIMINAIRE</span>
                            <span class="text-xs text-slate-400">PROQUELEC AIV7</span>
                        </div>
                        <div class="p-4 text-sm text-slate-200 font-mono">
                            <div class="mb-2 uppercase font-bold text-white">${fact.rule || "Règle Normative"}</div>
                            
                            <div class="grid grid-cols-2 gap-4 my-3">
                                <div class="bg-slate-700/50 p-2 rounded">
                                    <div class="text-xs text-slate-400 uppercase">Éclairage</div>
                                    <div class="text-lg font-bold text-white">${fact.limits?.eclairage || "N/A"}</div>
                                </div>
                                <div class="bg-slate-700/50 p-2 rounded">
                                    <div class="text-xs text-slate-400 uppercase">Autres usages</div>
                                    <div class="text-lg font-bold text-white">${fact.limits?.autres_usages || "N/A"}</div>
                                </div>
                            </div>

                            <div class="text-xs text-slate-400 mb-2">
                                <span class="text-slate-500">Périmètre :</span> ${fact.scope || "N/A"}
                            </div>
                            
                            <div class="flex justify-between items-end border-t border-slate-700 pt-2 mt-2">
                                <div>
                                    <div class="text-xs text-slate-500">Statut</div>
                                    <div class="text-emerald-400 font-bold uppercase">${fact.status || "CONFORME"}</div>
                                </div>
                                <div class="text-right">
                                    <div class="text-xs text-slate-500">Confiance</div>
                                    <div class="text-white font-bold">ÉLEVÉ</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    `;
                }

                // Certification Display (Legacy / Footer)
                if (data.norm_reference && !data.structured_fact) { // Only show footer if no Inspector block (avoid duplicate)
                    const ref = data.norm_reference;
                    const confColor = data.confidence === 'high' ? 'bg-emerald-500' : (data.confidence === 'medium' ? 'bg-amber-500' : 'bg-red-500');

                    confidenceHtml = `
                    <div class="mt-2 pt-2 border-t border-slate-600 text-xs flex gap-3 items-center">
                        <span class="px-2 py-0.5 rounded text-black font-bold ${confColor} uppercase tracking-wider">${data.confidence} CONFIDENCE</span>
                        <span class="text-slate-400">⚖️ RÉF: ${ref.code} (Art. ${ref.article || 'Général'}) - ${ref.country}</span>
                    </div>`;
                } else if (data.norm_reference) {
                    // Simple reference line if Inspector block is present
                    const ref = data.norm_reference;
                    confidenceHtml = `
                     <div class="mt-2 text-xs text-slate-500 text-right">
                        Ref: ${ref.code} (Art. ${ref.article}) - ${ref.country}
                     </div>`;
                }

                // COMBINE: Inspector Block + Pedagogical (LLM) Block
                let finalHtml = "";
                if (inspectorHtml) {
                    if (currentMode === 'kebe') {
                        // CLEAN MODE: Only Inspector Block (Hide redundant raw text)
                        finalHtml = inspectorHtml;
                    } else {
                        // HYBRID MODE: Inspector + Pedagogical Note
                        finalHtml = inspectorHtml + `<div class="pl-4 border-l-2 border-slate-700 ml-1 text-slate-300 italic"><div class="text-xs text-slate-500 not-italic mb-1">💡 Note pédagogique :</div>${mdHtml}</div>` + confidenceHtml;
                    }
                } else {
                    finalHtml = mdHtml + confidenceHtml;
                }

                addBubble(finalHtml, 'ai');
                conversationHistory.push({ role: 'ai', content: data.response });

            } catch (e) {
                removeBubble(loadingId);
                addBubble("❌ ERREUR: Connexion perdue.", 'ai');
            }
        }

        function addBubble(html, type, isTemp = false) {
            const div = document.createElement('div');
            div.className = `bubble ${type}`;
            div.innerHTML = html;
            if (isTemp) div.id = 'tempLoading';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div.id;
        }

        function removeBubble(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        // PDF EXPORT
        async function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFont("courier");
            doc.setFontSize(16);
            doc.setTextColor(0, 100, 0);
            doc.text("RAPPORT D'INTERVENTION - PROQUELEC AI V7", 10, 20);

            doc.setFontSize(10);
            doc.setTextColor(0, 0, 0);
            doc.text(`Date: ${new Date().toLocaleString()}`, 10, 30);

            let y = 40;
            conversationHistory.forEach(msg => {
                if (y > 280) { doc.addPage(); y = 20; }

                doc.setFont("courier", "bold");
                doc.text(msg.role.toUpperCase() + ":", 10, y);
                y += 5;

                doc.setFont("courier", "normal");
                const lines = doc.splitTextToSize(msg.content.replace(/<[^>]*>?/gm, ''), 180);
                doc.text(lines, 10, y);
                y += (lines.length * 5) + 5;
            });

            doc.save("rapport_intervention_v7.pdf");
        }
    </script>
</body>

</html>

definitions:
  description: "Termes et définitions essentiels pour la compréhension de la norme"
  categories:
    - numero: 3.1
      titre: Définitions relatives aux structures et aux personnes
      termes:
        - terme: Entreprise exploitante
          numero: 3.1.1
          definition: entreprise qui utilise les INSTALLATIONS ou qui exploite les OUVRAGES en tant que propriétaire, ou par délégation, ou par contrat
          exemples: []
        - terme: Entreprise extérieure
          numero: 3.1.2
          definition: "entreprise qui intervient pour réaliser des OPERATIONS au profit du DONNEUR D'ORDRE (convention, contrat, etc.)"
          exemples: []
        - terme: "Donneur d'ordre"
          numero: 3.1.3
          definition: personne physique ou morale, en général entreprise utilisatrice, qui décide de faire réaliser des OPERATIONS par une entreprise operant soit sur un OUVRAGE ou une INSTALLATION ELECTRIQUE, soit dans leur ENVIRONNEMENT
          exemples: []
        - terme: Employeur
          numero: 3.1.4
          definition: personne physique qui emploie du personnel et a autorité sur lui
          exemples: []
        - terme: "Chef d'établissement"
          numero: 3.1.5
          definition: "personne physique qui assume la responsabilité d'une entreprise exploitante"
          exemples: []
        - terme: "Chargé d'exploitation électrique"
          numero: 3.1.6
          definition: "personne chargée d'assurer les opérations d'EXPLOITATION (conduite, utilisation, entretien, maintenance, dépannage, surveillance, accès, etc.) d'un OUVRAGE ou d'une INSTALLATION électrique"
          exemples: []
        - terme: Personne qualifiée (en électricité)
          numero: 3.1.7
          definition: "personne ayant une formation, une connaissance et une expérience appropriées en électricité pour lui permettre d'analyser le risque électrique et d'éviter les dangers que peut présenter l'électricité [3.2.3, NF EN 50110-1 modifiée] sécurité électrique."
          exemples: []
        - terme: Personne avertie
          numero: 3.1.8
          definition: "personne suffisamment informée par des PERSONNES QUALIFIEES pour lui permettre d'éviter les dangers que peut présenter l'électricité [3.2.4, NF EN 50110-1]"
          exemples: []
        - terme: Personne ordinaire
          numero: 3.1.9
          definition: "personne qui n'est ni une PERSONNE QUALIFIEE, ni une PERSONNE AVERTIE [3.2.5, NF EN 50110-1]"
          exemples: []
        - terme: Opérateur
          numero: 3.1.10
          definition: "personne réalisant, ou participant à, ou assurant la direction des OPERATIONS d'ORDRE ELECTRIQUE ou d'ORDRE NON ELECTRIQUE soit sur des OUVRAGES ou des INSTALLATIONS, soit dans leur ENVIRONNEMENT"
          exemples: []
        - terme: Charge de consignation
          numero: 3.1.11
          definition: "personne chargée d'effectuer ou de faire effectuer les opérations de la CONSIGNATION électrique"
          exemples: []
        - terme: Charge de travaux
          numero: 3.1.12
          definition: "personne chargee d'assurer la direction effective des TRAVAUX d'ORDRE ELECTRIQUE OU d'ORDRE NON ELECTRIQUE"
          exemples: []
        - terme: "Chargé d'intervention"
          numero: 3.1.13
          definition: "personne chargée d'assurer la réalisation des INTERVENTIONS BT en Basse Tension CHARGE D'INTERVENTION GENERALE OU CHARGE D'INTERVENTION ELEMENTAIRE."
          exemples: []
        - terme: "Chargé d'opérations spécifiques"
          numero: 3.1.14
          definition: "terme désignant indistinctement la personne chargée d'assurer la direction des ESSAIS, MESURAGES, VERIFICATIONS OU MANŒUVRES ou de proceder elle-même a des ESSAIS, MESURAGES, VERIFICATIONS OU MANŒUVRES"
          exemples: []
        - terme: Charge de chantier
          numero: 3.1.15
          definition: "personne chargée d'assurer la direction des TRAVAUX d'ORDRE NON ELECTRIQUE"
          exemples: []
        - terme: Exécutant
          numero: 3.1.16
          definition: "personne assurant l'exécution des OPERATIONS. Cette personne opère sous la conduite d'un CHARGE DE TRAVAUX, d'un CHARGE D'INTERVENTION GENERALE, d'un CHARGE D'OPERATIONS SPECIFIQUES ou d'un CHARGE DE CHANTIER"
          exemples: []
        - terme: Surveillant de sécurité électrique
          numero: 3.1.17
          definition: "personne possédant la connaissance nécessaire pour surveiller une ou plusieurs personnes pendant le déroulement d'une OPERATION déterminée conformément à des instructions reçues Dans le présent document, le SURVEILLANT DE SECURITE ELECTRIQUE est nommé, selon la nature de la surveillance, SURVEILLANT DE SECURITE ELECTRIQUE D'OPERATION et D'ACCOMPAGNEMENT, OU SURVEILLANT DE SECURITE ELECTRIQUE DE LIMITE"
          exemples: []
        - terme: Habilitation - personne habilitée
          numero: 3.1.18
          definition: "reconnaissance par l'EMPLOYEUR de la capacité d'une personne placée sous son autorité à accomplir les tâches qui lui sont confiées en sécurité vis-à-vis du risque électrique"
          exemples: []
    - numero: 3.2
      titre: Définitions relatives aux installations et aux ouvrages électriques
      termes:
        - terme: Installation électrique - ouvrage électrique
          numero: 3.2.1
          definition: "ensemble des MATERIELS électriques mis en œuvre pour la production, la conversion, la distribution ou l'utilisation de l'énergie électrique Dans le présent document, le qualificatif électrique est omis lorsqu'il n'y a pas d'ambiguïté. Le terme « OUVRAGE > est exclusivement réservé, dans le présent document, aux réseaux publics de transport et de distribution d'électricité et à leurs annexes. Le terme « INSTALLATION > s'applique, dans le présent document, à toute INSTALLATION électrique à l'exclusion des OUVRAGES."
          exemples: []
        - terme: Matériel électrique
          numero: 3.2.2
          definition: "matériel utilisé pour la production, la transformation, la distribution ou l'utilisation de l'énergie électrique, tel que machine, transformateur, appareillage électrique, appareil de mesure, dispositif de protection, canalisation électrique, matériels d'utilisation [VEI 826-16-01]"
          exemples: []
        - terme: Ligne électrique aérienne
          numero: 3.2.3
          definition: "ensemble de conducteurs nus ou isolés, fixes en élévation sur des supports (poteaux, pylônes, potelets, façades d'immeuble, etc.) au moyen d'isolateurs ou de systèmes de suspension adéquats"
          exemples: []
        - terme: Canalisation électrique isolée - Canalisation isolée
          numero: 3.2.4
          definition: ensemble constitué par un ou plusieurs conducteurs électriques isolés et les éléments assurant leur fixation et leur protection mécanique ou sous goulotte.
          exemples: []
        - terme: Canalisation encastrée
          numero: 3.2.5
          definition: "le terme encastré signifie présence d'un côté affleurant"
          exemples: []
        - terme: Canalisation noyée
          numero: 3.2.6
          definition: le terme noyé signifie complètement enrobé
          exemples: []
        - terme: Partie active
          numero: 3.2.7
          definition: "conducteur ou partie conductrice destiné à être mis sous tension en service normal, y compris le conducteur neutre. Par convention, le conducteur PEN n'est pas considéré comme un conducteur actif [VEI 826-12-08 modifié] [VEI 195-02-19 modifié]"
          exemples: []
        - terme: Conducteur PEN
          numero: 3.2.8
          definition: conducteur assurant à la fois les fonctions de conducteur de protection et de conducteur neutre N pour le conducteur neutre.
          exemples: []
        - terme: "Elément (d'accumulateur)"
          numero: 3.2.9
          definition: "unité fonctionnelle de base, consistant en un assemblage d'électrodes, d'électrolyte, de conteneur, de bornes et généralement de séparateurs, qui est une source d'énergie électrique obtenue par transformation directe d'énergie chimique [VEI 482-01-01]"
          exemples: []
        - terme: Accumulateur
          numero: 3.2.10
          definition: élément qui est conçu pour être rechargé électriquement [VEI 482-01-03]
          exemples: []
        - terme: "Batterie d'accumulateurs"
          numero: 3.2.11
          definition: "un ou plusieurs éléments équipés des dispositifs nécessaires pour l'emploi, par exemple boîtier, bornes, marquage et dispositifs de protection [VEI 482-01-04 Modifié] accouplés pour générer un courant donné sous une tension donnée."
          exemples: []
    - numero: 3.3
      titre: Définitions relatives aux grandeurs électriques
      termes:
        - terme: Tension nominale
          numero: 3.3.1
          definition: "valeur de la tension par laquelle l'installation électrique ou une partie de l'installation électrique est désignée et identifiée [VEI 826-11-01]"
          exemples: []
        - terme: Domaines de tension
          numero: 3.3.2
          definition: "le classement des tensions nominales est effectué, dans ce présent document, par domaine de tension (voir Tableau 1) En basse tension et en exploitation normale, la tension réelle d'un OUVRAGE ou d'une partie d'OUVRAGE peut excéder de 10 % au maximum sa valeur nominale, sans que cela entraîne une modification du domaine de tension. Tableau 1 - Tableau des domaines de tensions Domaines de tension Valeur de la tension nominale Un exprimée en volts en courant alternatif en courant continu lisse (1) Très basse tension Un ≤ 50 Un ≤ 120 (domaine TBT) Basse tension 50 < Un ≤ 1 000 120 < Un ≤ 1 500 (domaine BT) Haute Domaine HTA 1 000 < Un ≤ 50 000 1 500 < Un ≤ 75 000 Tension Domaine HTB Un > 50 000 Un > 75 000 (1) Le courant continu lisse est celui défini conventionnellement par un taux d'ondulation non supérieur à 10 % en valeur efficace, la valeur maximale de crête ne devant pas être supérieure à 15 %. Pour les autres courants continus, les valeurs des tensions nominales sont les mêmes que pour le courant alternatif."
          exemples: []
        - terme: Très basse tension de sécurité (TBTS)
          numero: 3.3.3
          definition: "caractéristiques techniques des INSTALLATIONS du domaine TBT dont : . toutes les PARTIES ACTIVES sont séparées des PARTIES ACTIVES de toute autre INSTALLATION par une isolation double ou renforcée ; . toutes les PARTIES ACTIVES sont isolées de la terre et de tout conducteur de protection appartenant à toute autre INSTALLATION."
          exemples: []
        - terme: Très Basse Tension de Protection (TBTP)
          numero: 3.3.4
          definition: caractéristiques techniques des INSTALLATIONS du domaine TBT qui répondent à la première condition de la TBTS, mais pas à la seconde condition
          exemples: []
        - terme: Très Basse Tension Fonctionnelle (TBTF)
          numero: 3.3.5
          definition: caractéristiques techniques des INSTALLATIONS du domaine TBT qui ne sont ni TBTS, ni TBTP
          exemples: []
    - numero: 3.4
      titre: Définitions relatives aux operations
      termes:
        - terme: Exploitation
          numero: 3.4.1
          definition: "toutes les activités nécessaires pour permettre le fonctionnement d'un OUVRAGE ou d'une INSTALLATION électriques. Ces activités comprennent notamment les travaux, les MANŒUVRES, les commandes, la surveillance et la maintenance"
          exemples: []
        - terme: Opération
          numero: 3.4.2
          definition: "activité exercée, soit directement sur les OUVRAGES ou les INSTALLATIONS électriques, soit dans un ENVIRONNEMENT électrique. Elle peut être de deux natures : · OPERATION d'ORDRE ELECTRIQUE ; . OPERATION d'ORDRE NON ELECTRIQUE."
          exemples: []
        - terme: "Opération d'ordre électrique"
          numero: 3.4.3
          definition: "OPERATION qui, pour un OUVRAGE ou une INSTALLATION en exploitation électrique, concerne les PARTIES ACTIVES, leurs isolants, la continuité des masses et autres parties conductrices des MATERIELS (les circuits magnétiques, etc.) ainsi que les conducteurs de protection. effectuées soit sur les OUVRAGES ou les INSTALLATIONS électriques, soit dans l'ENVIRONNEMENT de pièces nues sous tension."
          exemples: []
        - terme: "Type d'opérations d'ordre électrique"
          numero: 3.4.4
          definition: "On distingue les types d'OPERATIONS d'ORDRE ELECTRIQUE suivants : . TRAVAIL HORS TENSION ; · TRAVAIL SOUS TENSION ; • TRAVAIL AU VOISINAGE SIMPLE ; · TRAVAIL AU VOISINAGE RENFORCE ; · INTERVENTION EN BASSE TENSION ; · OPERATIONS SPECIFIQUES comprenant les ESSAIS, les MESURAGES, les VERIFICATIONS et les MANŒUVRES."
          exemples: []
        - terme: Essai
          numero: 3.4.5
          definition: "OPERATION destinée à s'assurer du bon fonctionnement ou de l'état électrique, mécanique ou autre d'un OUVRAGE ou d'une INSTALLATION électrique"
          exemples: []
        - terme: Mesurage
          numero: 3.4.6
          definition: "OPERATION destinée à mesurer des grandeurs électriques, ou des grandeurs physiques (distance, température ou autres) 3.4.7 Vérification OPERATION destinée à s'assurer qu'un OUVRAGE ou une INSTALLATION est conforme à un référentiel"
          exemples: []
        - terme: Manœuvre
          numero: 3.4.8
          definition: "OPERATION conduisant à un changement de la configuration électrique d'un OUVRAGE, d'une INSTALLATION ou de l'alimentation électrique d'un MATERIEL. Les MANŒUVRES sont effectuées au moyen d'appareillages spécialement prévus à cet effet, tels qu'interrupteurs, disjoncteurs, sectionneurs, ponts, etc. manœuvres d'urgence."
          exemples: []
        - terme: "Opération d'ordre non électrique"
          numero: 3.4.9
          definition: "OPERATION qui ne répond pas à la définition d'une OPERATION d'ORDRE ELECTRIQUE, telle que : · celle liée à la construction, à la réalisation, au démantèlement ou à la maintenance dans le VOISINAGE ou sur un OUVRAGE ou une INSTALLATION électrique, tels que les travaux du BTP, de nettoyage, de désherbage, etc. ; • celle liee a une OPERATION ne concernant pas directement un OUVRAGE ou une INSTALLATION électrique, mais effectuée dans l'ENVIRONNEMENT de cet OUVRAGE ou cette INSTALLATION, tels que les travaux du BTP, les activités de livraison, de déménagement etc. Peut également être considérée comme une OPERATION d'ORDRE NON ELECTRIQUE au VOISINAGE d'un OUVRAGE ou d'une INSTALLATION d'un domaine de tension basse tension ou haute tension, toute OPERATION d'ORDRE ELECTRIQUE effectuée sur un OUVRAGE ou sur une INSTALLATION d'un autre domaine de tension, respectivement haute tension ou basse tension"
          exemples: []
        - terme: Consignation
          numero: 3.4.10
          definition: "procédure d'ordre électrique destinée à assurer la protection des personnes et des OUVRAGES ou des INSTALLATIONS contre les conséquences de tout maintien accidentel ou de toute apparition ou réapparition intempestive de tension sur ces OUVRAGES ou ces INSTALLATIONS"
          exemples: []
        - terme: Déconsignation
          numero: 3.4.11
          definition: "procédure d'ordre électrique destinée à remettre un OUVRAGE ou une INSTALLATION précédemment consigné dans un état qui permet sa remise en service"
          exemples: []
        - terme: Mise hors tension
          numero: 3.4.12
          definition: "procédure d'ordre électrique destinée à réduire le risque électrique en supprimant la tension sur un OUVRAGE ou une INSTALLATION réapparition intempestive de tension."
          exemples: []
        - terme: Mise hors de portée
          numero: 3.4.13
          definition: "moyen de protection des personnes vis-à-vis d'un contact avec une pièce nue sous tension réalisé, soit par ELOIGNEMENT, soit par interposition d'un OBSTACLE, soit par ISOLATION de la pièce nue sous tension"
          exemples: []
        - terme: Réquisition ou essai sous alimentation autonome
          numero: 3.4.14
          definition: "procédure qui permet, après une CONSIGNATION ou une première étape de CONSIGNATION d'un OUVRAGE ou d'une INSTALLATION, de réalimenter l'OUVRAGE ou l'INSTALLATION par une ou des sources autonomes"
          exemples: []
        - terme: Situation de travail
          numero: 3.4.15
          definition: "combinaison du type d'OPERATIONS avec l'une ou plusieurs des conditions d'ENVIRONNEMENT électrique suivantes : · présence ou non d'induction ou de couplage capacitif ; · présence ou non d'atmosphère explosive ; · situation météorologique."
          exemples: []
        - terme: Phase de travail
          numero: 3.4.16
          definition: "enchaînement des gestes élémentaires nécessaires à la mise en œuvre des outils et des matériels sur l'OUVRAGE ou l'INSTALLATION ou dans son ENVIRONNEMENT. Elle a un objectif prédéfini et s'achève sur un état stable"
          exemples: []
    - numero: 3.5
      titre: Définitions relatives aux distances, zones et locaux
      termes:
        - terme: Environnement électrique
          numero: 3.5.1
          definition: "volume géographique autour d'une pièce nue sous tension ou d'une CANALISATION ISOLEE, limite par la DISTANCE LIMITE D'INVESTIGATION (50 m), utilisé dans le cadre des OPERATIONS d'ORDRE ELECTRIQUE ou d'ORDRE NON ELECTRIQUE"
          exemples: []
        - terme: Voisinage
          numero: 3.5.2
          definition: "en présence de pièces nues sous tension, le VOISINAGE est l'espace compris en haute tension entre la DISTANCE LIMITE DE VOISINAGE SIMPLE (DLVS) et la DISTANCE MINIMALE D'APPROCHE (DMA) et en basse tension entre la DISTANCE LIMITE DE VOISINAGE SIMPLE (DLVS) et la pièce nue. Le VOISINAGE comprend deux zones : le VOISINAGE SIMPLE et le VOISINAGE RENFORCE"
          exemples: []
        - terme: Champ libre
          numero: 3.5.3
          definition: espace sans OBSTACLE entourant une pièce nue sous tension
          exemples: []
        - terme: Zone de travail
          numero: 3.5.4
          definition: zone située sur un OUVRAGE, une INSTALLATION ou dans leur ENVIRONNEMENT, dans laquelle le ou les OPERATEURS sont amenés à évoluer avec les outils, équipements et matériels. Cette zone est définie lors de la préparation du travail et délimitée
          exemples: []
        - terme: Poste de travail
          numero: 3.5.5
          definition: "emplacement occupé par un OPERATEUR dans la ZONE DE TRAVAIL pendant l'exécution d'une PHASE DE TRAVAIL"
          exemples: []
        - terme: "Zone d'évolution"
          numero: 3.5.6
          definition: "volume autour du POSTE DE TRAVAIL de chaque OPERATEUR dans lequel celui-ci est susceptible d'évoluer avec ses outils, équipements et matériels"
          exemples: []
        - terme: "Local ou emplacement d'accès reserve aux électriciens (local ou emplacement"
          numero: 3.5.7
          definition: "à risque spécifique électrique) local ou emplacement contenant des parties d'OUVRAGE ou d'INSTALLATION comportant des pièces nues susceptibles d'être sous tension et accessibles dans lequel au moins l'une des conditions ci-après existe : · la protection contre les contacts directs n'est pas assurée par construction (en basse tension seulement) ; · la protection contre les contacts directs est assurée par ELOIGNEMENT, ce mode de protection pouvant être annule par une personne ignorant le risque ; . la protection contre les contacts directs est assurée par OBSTACLE, ce mode de protection pouvant être contourne par une personne ignorant le risque."
          exemples: []
    - numero: 3.6
      titre: Définitions relatives aux équipements de travail et aux eQUIPEMENTS de protection
      termes:
        - terme: Equipement de protection individuelle (EPI)
          numero: 3.6.1
          definition: dispositif ou moyen destiné à être porté par une personne en vue de la protéger contre un ou plusieurs risques susceptibles de menacer sa sécurité ou sa santé
          exemples: []
        - terme: Pavé de terre
          numero: 3.6.2
          definition: "dispositif limiteur de tension, destiné à protéger le personnel contre les remises sous tension intempestives lors d'ESSAIS ou de TRAVAUX"
          exemples: []
        - terme: "Dispositif de vérification d'absence de tension (VAT)"
          numero: 3.6.3
          definition: "dispositif conçu spécifiquement à cet effet, destiné à fournir la preuve indiscutable de l'absence de tension nominale"
          exemples: []
        - terme: Equipement portable de mise à la terre et en court-circuit (MALT/CC)
          numero: 3.6.4
          definition: "équipement portable conçu à cet effet, raccordé aux parties électriques d'un OUVRAGE ou d'une INSTALLATION, en vue de réaliser la mise à la terre, la mise en court-circuit ou la mise à la terre et en court-circuit"
          exemples: []
        - terme: Outil isolant
          numero: 3.6.5
          definition: outil essentiellement ou totalement réalisé en matériau(x) isolant(s) [VEI 651-01-26 modifié]
          exemples: []
        - terme: Outil isolé
          numero: 3.6.6
          definition: outil en matériau(x) conducteur(s) partiellement ou complètement recouvert(s) de matériau(x) isolant(s) [VEI 651-01-25 modifié]
          exemples: []
        - terme: Enveloppe
          numero: 3.6.7
          definition: élément assurant la protection des MATERIELS électriques contre certaines influences externes (chocs, intempéries, corrosions, etc.) et la protection des personnes contre le risque de contacts directs
          exemples: []
        - terme: Nappage
          numero: 3.6.8
          definition: action qui consiste à mettre en place ou a tendre une NAPPE ISOLANTE souple, sans contact direct avec les pièces nues sous tension, pour éviter aux OPERATEURS tout risque de contact fortuit
          exemples: []
        - terme: Habillage
          numero: 3.6.9
          definition: action qui consiste à recouvrir une pièce nue sous tension par contact direct de façon à rendre impossible tout contact avec un OPERATEUR
          exemples: []
        - terme: Nappe isolante
          numero: 3.6.10
          definition: dispositif de protection isolant souple dispose sur ou devant les pièces nues sous tension
          exemples: []
        - terme: Ecran
          numero: 3.6.11
          definition: dispositif de protection isolant ou conducteur, disposé à distance des pièces nues sous tension
          exemples: []
        - terme: Protecteur
          numero: 3.6.12
          definition: dispositif rigide ou souple, réalisé en matériau isolant et utilisé pour recouvrir de façon amovible les pièces nues sous tension, de manière a prevenir tout risque de contact fortuit avec celles-ci. Il concerne des produits divers, tels que profilés, capuchons, etc.
          exemples: []
        - terme: Isolation
          numero: 3.6.13
          definition: "moyen permettant de protéger les personnes contre un risque électrique à l'aide de matériau isolant ou de dispositif en matériau isolant"
          exemples: []
        - terme: Balisage
          numero: 3.6.14
          definition: moyen permettant de délimiter et de signaler une zone définie
          exemples: []
    - numero: 3.7
      titre: Liste des documents écrits (voir Annexe A)
      termes:

<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- Outer red border frame -->
  <rect x="10" y="10" width="180" height="180" rx="15" ry="15" fill="none" stroke="#DC2626" stroke-width="8"/>
  
  <!-- House outline -->
  <g stroke="#DC2626" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Roof -->
    <path d="M 50 110 L 100 50 L 150 110" />
    
    <!-- House body -->
    <rect x="50" y="110" width="100" height="70" />
    
    <!-- Door/Foundation -->
    <rect x="75" y="150" width="50" height="30" />
    
    <!-- Light bulb inside -->
    <circle cx="100" cy="85" r="18" fill="none" stroke="#DC2626" stroke-width="5"/>
    <!-- Bulb screw base -->
    <circle cx="100" cy="108" r="3" fill="#DC2626"/>
    <line x1="95" y1="108" x2="105" y2="108" stroke="#DC2626" stroke-width="2"/>
    <line x1="100" y1="105" x2="100" y2="110" stroke="#DC2626" stroke-width="2"/>
    
    <!-- Light rays -->
    <line x1="100" y1="55" x2="100" y2="42" stroke="#DC2626" stroke-width="3"/>
    <line x1="125" y1="62" x2="134" y2="53" stroke="#DC2626" stroke-width="3"/>
    <line x1="135" y1="85" x2="148" y2="85" stroke="#DC2626" stroke-width="3"/>
    <line x1="75" y1="62" x2="66" y2="53" stroke="#DC2626" stroke-width="3"/>
    <line x1="65" y1="85" x2="52" y2="85" stroke="#DC2626" stroke-width="3"/>
  </g>
</svg>
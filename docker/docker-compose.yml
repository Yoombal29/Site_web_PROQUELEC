name: site-proquelec
version: '3.8'

services:
  # 1. Base de données - Cœur du Corpus Normatif
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${PG_PORT:-5436}:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - proquelec-net

  # 2. Gestion Documentaire
  alfresco:
    image: alfresco/alfresco-content-repository-community:7.2.0
    environment:
      JAVA_OPTS: " -Ddb.driver=org.postgresql.Driver -Ddb.username=postgres -Ddb.password=${POSTGRES_PASSWORD} -Ddb.url=jdbc:postgresql://db:5432/postgres?currentSchema=public -Dindex.subsystem.name=noindex -Ddeployment.method=docker "
    depends_on:
      - db
    networks:
      - proquelec-net

  share:
    image: alfresco/alfresco-share:7.2.0
    environment:
      REPO_HOST: "alfresco"
      REPO_PORT: "8080"
    ports:
      - "${ALFRESCO_PORT:-8180}:8080"
    depends_on:
      - alfresco
    networks:
      - proquelec-net

  # 3. BI & Reporting
  metabase:
    image: metabase/metabase:latest
    ports:
      - "${METABASE_PORT:-3101}:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DB: postgres
      MB_DB_PORT: 5432
      MB_DB_USER: postgres
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: db
    depends_on:
      - db
    networks:
      - proquelec-net

  # 4. Authentification Unique (SSO)
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT:-8183}:8080"
    networks:
      - proquelec-net

  # 4b. Authentification Locale (GoTrue)
  auth:
    image: supabase/gotrue:v2.158.1
    depends_on:
      - db
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_API_EXTERNAL_URL: http://localhost:3102/auth/v1
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres?sslmode=disable&search_path=auth
      GOTRUE_SITE_URL: http://localhost:5174
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_JWT_SECRET: "sovereign_secure_key_proquelec_2026"
      GOTRUE_JWT_EXP: 3600
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      API_EXTERNAL_URL: http://localhost:3102/auth/v1
    networks:
      - proquelec-net

  # 5. API Bridge (PostgREST)
  api:
    image: postgrest/postgrest:latest
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: "sovereign_secure_key_proquelec_2026"
      PGRST_JWT_ROLE_CLAIM_KEY: ".role"
    depends_on:
      - db
    networks:
      - proquelec-net

  # 6. API Gateway (Nginx)
  gateway:
    image: nginx:alpine
    ports:
      - "3102:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - auth
    networks:
      - proquelec-net

  swagger:
    image: swaggerapi/swagger-ui
    ports:
      - "3103:8080"
    environment:
      API_URL: http://localhost:3102/rest/v1/
    networks:
      - proquelec-net

networks:
  proquelec-net:
    name: proquelec-internal-network
    driver: bridge

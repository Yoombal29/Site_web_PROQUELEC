name: site-proquelec
version: '3.8'

services:
  # 1. Base de données - Cœur du Corpus Normatif
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${PG_PORT:-5436}:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - proquelec-net
  # 3. BI & Reporting
  metabase:
    image: metabase/metabase:latest
    ports:
      - "${METABASE_PORT:-3101}:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DB: postgres
      MB_DB_PORT: 5432
      MB_DB_USER: postgres
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: db
    depends_on:
      - db
    networks:
      - proquelec-net
  # 6. API Gateway (Nginx)
  gateway:
    image: nginx:alpine
    ports:
      - "3102:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    # No internal API containers configured — gateway kept minimal
    networks:
      - proquelec-net


networks:
  proquelec-net:
    name: proquelec-internal-network
    driver: bridge

events {}
http {
    include       mime.types;
    default_type  application/octet-stream;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;

        # Minimal gateway: health endpoint only (other services removed)
        location /health {
            add_header Content-Type text/plain;
            return 200 'OK';
        }
    }
}

events {}
http {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        
        # CORS permissive pour le dev local
        set $cors_origin "*";
        
        location /rest/v1/ {
            # Preflight OPTIONS
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$cors_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,apikey,Authorization,x-client-info,accept-profile,content-profile' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' '$cors_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,apikey,Authorization,x-client-info,accept-profile,content-profile' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,Content-Type,apikey' always;

            proxy_pass http://api:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # PostgREST specific headers
            proxy_set_header Accept-Profile $http_accept_profile;
            proxy_set_header Content-Profile $http_content_profile;
            
            # Supprimer les headers de PostgREST qui pourraient doubler
            proxy_hide_header 'Access-Control-Allow-Origin';
        }

        # Silencing Realtime 404s
        location /realtime/v1/ {
            add_header 'Access-Control-Allow-Origin' '$cors_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,apikey,Authorization,x-client-info' always;
            return 404 '{"message":"Realtime not supported in sovereign mode"}';
        }

        location /health {
            return 200 'OK';
        }
    }
}
